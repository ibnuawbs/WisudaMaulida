<style>

        .rpg-dialog::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 2px solid #000000;
            pointer-events: none;
        }

        .corner-accent {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #000000;
        }

        .corner-tl { top: -8px; left: -8px; }
        .corner-tr { top: -8px; right: -8px; }
        .corner-bl { bottom: -8px; left: -8px; }
        .corner-br { bottom: -8px; right: -8px; }

        .cursor-blink {
            display: inline-block;
            width: 12px;
            height: 18px;
            background-color: #000000;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .pixel-bar-segment {
            height: 8px;
            width: 8px;
            margin-right: 2px;

<script>
        // RPG menu active interactions
        const items = document.querySelectorAll('.group');
        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                const icon = item.querySelector('.material-symbols-outlined');
                if (icon) icon.classList.add('animate-pulse');
            });
            item.addEventListener('mouseleave', () => {
                const icon = item.querySelector('.material-symbols-outlined');
                if (icon) icon.classList.remove('animate-pulse');
            });
        });

        // Logika pengalihan ke halaman page5.html saat tombol ditekan
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.getElementById('next-page-btn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    window.location.href = "page5.html";
                });
            }
        });
