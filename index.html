</button>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const dialogBox = document.getElementById('dialog-box');
            const textElement = document.getElementById('typewriter-text');
            const buttonContainer = document.getElementById('button-container');
            const startBtn = document.getElementById('start-btn');
            const fullText = "Terimakasih sudah klik link ini.";
            
            setTimeout(() => {
                if (dialogBox) dialogBox.classList.remove('opacity-0', 'translate-y-10');
                startTypewriter();
            }, 500);

            function startTypewriter() {
                let i = 0;
                const speed = 70;

                function type() {
                    if (i < fullText.length) {
                        textElement.textContent += fullText.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        textElement.classList.remove('typewriter-cursor');
                        // Tampilkan container tombol setelah selesai mengetik
                        buttonContainer.classList.remove('opacity-0', 'pointer-events-none');
                        buttonContainer.classList.add('opacity-100');
                    }
                }
                type();
            }

            // Handler klik tombol untuk pindah ke page2.html
            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    startBtn.style.transform = 'translateY(4px)';
                    setTimeout(() => {
                        startBtn.style.transform = 'translateY(0)';
                        window.location.href = "page2.html";
                    }, 100);
                });
            }
        });
    </script>
