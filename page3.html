<style>
        @keyframes blink-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-blink-slow {
            animation: blink-slow 2s ease-in-out infinite;
        }
        
        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .progress-fill {
            animation: fillProgress 5s linear forwards;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .pixel-btn {
            box-shadow: 
                0 -4px 0 0 #ffffff,
                0 4px 0 0 #ffffff,
                -4px 0 0 0 #ffffff,
                4px 0 0 0 #ffffff;
            transition: all 0.2s ease;
        }
        .pixel-btn:hover {
            box-shadow: 
                0 -4px 0 0 #cccccc,
                0 4px 0 0 #cccccc,
                -4px 0 0 0 #cccccc,
                4px 0 0 0 #cccccc;
            transform: scale(1.05);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-hidden font-body-md select-none">
<div class="crt-overlay"></div>
<main class="relative z-10 flex flex-col items-center justify-center text-center px-margin w-full max-w-2xl">
<div class="flex flex-col items-center gap-6 mb-16">
<div class="text-error animate-pulse">
<span class="material-symbols-outlined text-[64px]" style="font-variation-settings: 'FILL' 1;">
                    warning
                </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-error tracking-widest animate-blink-slow">
                SYSTEM OVERLOAD!
            </h1>
<p class="font-headline-sm text-headline-sm text-on-surface">
                Karena Subjek terlalu keren! 😎
            </p>
</div>
<div class="w-full flex flex-col items-center gap-8">
<div class="w-full max-w-md px-margin flex flex-col items-center">
<div class="w-full h-8 bg-surface-container-lowest border-4 border-outline p-1 relative overflow-hidden flex items-center">
<div class="h-full bg-secondary-container progress-fill flex">
<div class="w-full h-full" style="background-image: linear-gradient(to right, transparent 80%, rgba(0,0,0,0.5) 80%); background-size: 12px 100%;"></div>
</div>
</div>
<div class="mt-4 flex items-center gap-2 h-6">
<span class="font-label-lg text-label-lg text-on-surface uppercase tracking-widest" id="status-text">
                        sedang memperbaiki sistem
                    </span>
<span class="material-symbols-outlined animate-spin text-secondary-fixed text-sm" id="settings-icon">
                        settings
                    </span>
</div>
</div>
<div class="opacity-0 invisible transition-all duration-500 transform translate-y-4" id="action-container">
<button id="next-btn" class="pixel-btn bg-white text-black font-headline-sm px-10 py-4 uppercase tracking-[0.2em]">
                    SELANJUTNYA
                </button>
</div>
</div>
</main>
<div class="fixed top-8 left-8 w-4 h-4 border-t-4 border-l-4 border-outline opacity-30"></div>
<div class="fixed top-8 right-8 w-4 h-4 border-t-4 border-r-4 border-outline opacity-30"></div>
<div class="fixed bottom-8 left-8 w-4 h-4 border-b-4 border-l-4 border-outline opacity-30"></div>
<div class="fixed bottom-8 right-8 w-4 h-4 border-b-4 border-r-4 border-outline opacity-30"></div>

<script>
        // Micro-interaction: Periodic "glitch" sound simulation through visual shake
        setInterval(() => {
            if (Math.random() > 0.95) {
                document.body.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
                setTimeout(() => {
                    document.body.style.transform = 'translate(0,0)';
                }, 50);
            }
        }, 100);

        // State change after progress completes (5s)
        setTimeout(() => {
            const statusText = document.getElementById('status-text');
            const settingsIcon = document.getElementById('settings-icon');
            const actionContainer = document.getElementById('action-container');

            if (statusText) {
                statusText.innerText = "SISTEM STABIL - SIAP BERAKSI";
                statusText.classList.add('text-secondary-fixed');
            }
            if (settingsIcon) {
                settingsIcon.classList.remove('animate-spin');
                settingsIcon.innerText = 'check_circle';
            }
            if (actionContainer) {
                actionContainer.classList.remove('opacity-0', 'invisible', 'translate-y-4');
                actionContainer.classList.add('opacity-100', 'visible', 'translate-y-0');
            }
        }, 5000);

        // Handler klik dipasang di dalam skrip untuk mengalihkan ke page4.html
        document.addEventListener('DOMContentLoaded', () => {
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    window.location.href = "page4.html";
                });
            }
        });
    </script>
</body></html>
