<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>

                    "on-tertiary-container": "#380087",
                    "on-secondary-container": "#00686f",
                    "on-tertiary-fixed-variant": "#5700c9",
                    "surface-dim": "#190c2d",
                    "on-secondary-fixed": "#002022",
                    "tertiary-container": "#a37cff",

                    "secondary-fixed-dim": "#00dbe9",

                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#23005b",
                    "on-background": "#ecdcff",
                    "inverse-surface": "#ecdcff",
                    "on-secondary": "#00363a",
                    "outline-variant": "#564050",
                    "tertiary": "#d1bcff",
                    "primary-container": "#ff2ef1",
                    "on-error": "#690005",
                    "error-container": "#93000a",
                    "surface-container-low": "#211536",

<style>
        body {
            background-color: #FFB6C1; /* More saturated pink */
            overflow: hidden;
            image-rendering: pixelated;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        .rpg-dialog {
            background-color: white;
            border: 4px solid #190c2d;
            position: relative;
            box-shadow: 8px 8px 0px 0px rgba(25, 12, 45, 0.2);
            transform: scale(0.75); /* Scaled down by ~25% */
        }

        .rpg-dialog::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 2px solid #190c2d;
            pointer-events: none;
        }

        .corner-accent {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #190c2d;
        }

        .particle {
            position: absolute;
            bottom: -60px;
            pointer-events: none;
            z-index: 40;
            animation: float-up-sway linear forwards;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes float-up-sway {
            0% { 
                transform: translateY(0) translateX(0) rotate(0deg); 
                opacity: 1; 
            }
            25% {
                transform: translateY(-25vh) translateX(20px) rotate(10deg);
            }
            50% {
                transform: translateY(-50vh) translateX(-20px) rotate(-10deg);
            }
            75% {
                transform: translateY(-75vh) translateX(20px) rotate(10deg);
            }
            100% { 
                transform: translateY(-120vh) translateX(0) rotate(0deg); 
                opacity: 0.5; 
            }
        }

        @keyframes pulse-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .animated-emoji {
            display: inline-block;
            animation: pulse-bounce 2s infinite ease-in-out;
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .rpg-button {
            border: 2px solid #5c0057;
            background: #190c2d;
            color: #ffffff; /* Changed to white */
            padding: 10px 20px;
            position: relative;
            transition: all 0.1s;
        }

        .rpg-button:hover {
            background: #ffabee;
            color: #190c2d;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px 0px #5c0057;
        }

        .rpg-button:active {
            transform: translate(0px, 0px);
            box-shadow: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="crt-overlay"></div>
<main class="relative z-10 w-full flex items-center justify-center">
<!-- RPG DIALOG BOX -->
<div class="rpg-dialog p-6 md:p-10 text-center flex flex-col items-center justify-center max-w-sm">
<!-- Retro Corner Accents -->
<div class="corner-accent -top-2 -left-2"></div>
<div class="corner-accent -top-2 -right-2"></div>
<div class="corner-accent -bottom-2 -left-2"></div>
<div class="corner-accent -bottom-2 -right-2"></div>
<!-- Content Area -->
<div class="mb-6 flex flex-col justify-center items-center">
<div class="animated-emoji">📩</div>
<p class="font-headline-sm text-[1.2rem] text-surface-container-lowest leading-relaxed tracking-tight mb-2">
                Semua orang bangga dengan kamu
            </p>
<p class="font-headline-sm text-[1.2rem] text-surface-container-lowest leading-relaxed tracking-tight">
                Kamu juga harus bangga dengan dirimu sendiri
            </p>
</div>
<!-- Action Button -->
<button class="rpg-button font-label-lg text-label-lg tracking-widest uppercase" id="trigger-btn">
            Coba pencet
        </button>
</div>
</main>
<script>
    const btn = document.getElementById('trigger-btn');

    // Particle System logic
    btn.addEventListener('click', () => {
        // Screen shake effect
        const main = document.querySelector('main');
        main.style.transform = "translateX(4px)";
        setTimeout(() => main.style.transform = "translateX(-4px)", 50);
        setTimeout(() => main.style.transform = "translateX(0)", 100);

        // Spawn particles
        for (let i = 0; i < 40; i++) {
            setTimeout(() => createParticle(), i * 50);
        }
    });

    function createParticle() {
        const particle = document.createElement('div');
        const type = Math.floor(Math.random() * 5); // 0-1 Balloon, 2-4 Emoji
        
        particle.className = 'particle';
        
        if (type === 0 || type === 1) {
            // Red Balloon SVG
            particle.innerHTML = `<svg width="30" height="40" viewBox="0 0 24 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="12" cy="12" rx="10" ry="12" fill="#FF2E2E"/>
                <path d="M12 24V30" stroke="#190C2D" stroke-width="1.5" stroke-dasharray="2 2"/>
                <path d="M10 24L12 22L14 24H10Z" fill="#190C2D"/>
            </svg>`;
        } else {
            // Emojis
            const emojiPool = ['👍🏻', '🎉', '🎓'];
            particle.textContent = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            particle.style.fontSize = (Math.random() * 15 + 20) + 'px';
        }

        const startX = Math.random() * window.innerWidth;
        const duration = Math.random() * 3 + 3; // 3-6 seconds
        const delay = Math.random() * 0.2;
        const size = 0.8 + Math.random() * 0.5;

        particle.style.left = startX + 'px';
        particle.style.animationDuration = duration + 's';
        particle.style.animationDelay = delay + 's';
        particle.style.scale = size;

        document.body.appendChild(particle);

        // Cleanup
        setTimeout(() => {
            particle.remove();
        }, (duration + delay) * 1000);
    }
</script>
</body></html>
