<script>
        // Simple Pixel Particle Effect
        function triggerConfetti() {
            const container = document.getElementById('particles');
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute';
                p.style.width = '6px';
                p.style.height = '6px';
                p.style.backgroundColor = i % 2 === 0 ? '#ffabee' : '#00eefc';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px';
                p.style.zIndex = '5';
                p.style.boxShadow = '2px 2px 0px black';
                container.appendChild(p);

                const duration = 2000 + Math.random() * 3000;
                const anim = p.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${(Math.random()-0.5)*200}px, 110vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(.17,.67,.83,.67)'
                });

                anim.onfinish = () => p.remove();
            }
        }

        // Trigger confetti on load
        window.addEventListener('load', () => {
            triggerConfetti();
        });

        // Menangani pengalihan halaman saat tombol rahasia diklik
        document.addEventListener('DOMContentLoaded', () => {
            const secretBtn = document.getElementById('secret-msg-btn');
            if (secretBtn) {
                secretBtn.addEventListener('click', () => {
                    window.location.href = "page6.html";
                });
            }
        });
    </script>
