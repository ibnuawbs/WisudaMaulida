<style>
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }

        .rpg-dialog {
            border: 4px solid #140727;
            position: relative;
            box-shadow: 6px 6px 0px 0px #3c2e50;
        }

        .rpg-dialog::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px solid #140727;
            pointer-events: none;
        }

        .corner-accent {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #140727;
            z-index: 10;
        }

        /* Loading Bar Animation */
        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #140727;
            animation: fillProgress 7s linear forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Sequential Text Reveal */
        .status-text-item {
            opacity: 0;
            transform: translateY(4px);
        }

        .reveal-item-1 { animation: revealText 0.5s ease forwards 1s; }
        .reveal-item-2 { animation: revealText 0.5s ease forwards 3s; }
        .reveal-item-3 { animation: revealText 0.5s ease forwards 5s; }

        @keyframes revealText {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button Appearance */
        .reveal-btn {
            opacity: 0;
            pointer-events: none;
            animation: revealButton 0.5s ease forwards 7.5s;
        }

        @keyframes revealButton {
            to { opacity: 1; pointer-events: auto; }
        }

        /* Warning Blink */
        .warning-blink {
            animation: blinkRed 0.8s infinite steps(1);
        }

        @keyframes blinkRed {
            0%, 100% { opacity: 1; color: #ff0000; }
            50% { opacity: 0; }
        }

        .bg-pixel-city {
            background-image: url('https://lh3.googleusercontent.com/aida/ADBb0ui76BX5l3Ykd6yMGSMr1syAKk984nUU1ujMxKoqWoBvRm6bemdjNvMRTdFxMRN77rMcmBYL45DXEumqSK_7t9eTWynpQjrk9yVmrVIo2_pPBnfWnffYtJtaPwdbNoftAuWsBQg6p6GxXHuGY2R96Zy4CZcopI1Fpxpbes3XnHJGZjGhyZ46av6N6gRkk9jOsSaegAudXfURrGSfmYsY9yMdusEkSZqMZDGbPHttY5LxdJHQWmeGKAZ4Hw');
            background-size: cover;

        }

        .pixel-border {
            border: 4px solid #140727;
            background: #fff;
        }
    </style>
